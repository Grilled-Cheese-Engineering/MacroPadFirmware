# This file was generated from a template. Edit it to match your keyboard.
# See https://zmk.dev/docs/development/hardware-integration/new-shield for more
# instructions.

# This file will be copied into the user's config directory when they add this
# keyboard. Define any Kconfig options users may frequently want to set here,
# but leave them commented out, for example:

# Uncomment to enable the encoder
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment to enable the display
# CONFIG_ZMK_DISPLAY=y

#
# gce3x3macro.conf
#

# -----------------------
# USB / BLE
# -----------------------
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# -----------------------
# Studio
# -----------------------
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_DYNAMIC_KEYMAP=y

# Remove this if you want Studio to require unlocking
CONFIG_ZMK_STUDIO_LOCKING=n

# -----------------------
# Encoder
# -----------------------
CONFIG_EC11=y

# -----------------------
# Settings Storage
# -----------------------
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# -----------------------
# Optional Nice Features
# -----------------------

# Faster startup
CONFIG_ZMK_USB_INIT_PRIORITY=95

# Allow USB even while BLE is enabled
CONFIG_ZMK_USB_HID=y

# Optional logging while debugging
# CONFIG_LOG=y
# CONFIG_ZMK_LOG_LEVEL_DBG=y